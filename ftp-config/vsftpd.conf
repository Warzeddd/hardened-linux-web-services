# --- Configuration VSFTPD Projet Valserac ---

# 1. Paramètres Réseau
listen=YES
listen_ipv6=NO
# Restriction à l'interface privée uniquement
listen_address=192.168.10.10

# 2. Authentification et Droits
# Désactiver l'accès anonyme
anonymous_enable=NO
# Autoriser les utilisateurs locaux
local_enable=YES
# Autoriser l'écriture
write_enable=YES
dirmessage_enable=YES
use_localtime=YES

# 3. Logs
xferlog_enable=YES
xferlog_std_format=YES
log_ftp_protocol=YES
xferlog_file=/var/log/vsftpd.log
connect_from_port_20=YES

# 4. Chroot - Confinement dans /var/www
chroot_local_user=YES
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
local_root=/var/www
allow_writeable_chroot=YES

# 5. Certificats SSL
rsa_cert_file=/etc/apache2/ssl/valserac.crt
rsa_private_key_file=/etc/apache2/ssl/valserac.key

# 6. Configuration FTPS (SSL)
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES

# 7. Compatibilité Moderne
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO
require_ssl_reuse=NO
ssl_ciphers=HIGH

# 8. Mode Passif (Pour traverser le pare-feu)
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
# Adresse IP annoncée au client (IP Privée)
pasv_address=192.168.10.10
